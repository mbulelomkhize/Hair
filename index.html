<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Cherry Crown Hair — Premium Lace Wigs & Frontals, KwaZulu-Natal</title>
<meta name="description" content="Premium lace frontals and wigs delivered to your door in KwaZulu-Natal. Free delivery and a complimentary hair gift with every order."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
/* ─────────────────────────────────────────
   DESIGN TOKENS
───────────────────────────────────────── */
:root {
  --black:   #080508;
  --dark:    #110D12;
  --mid:     #221A23;
  --ink:     #1A1320;
  --smoke:   #6B6070;
  --silver:  #B0A8B5;
  --white:   #FDFCFE;
  --off:     #F7F3F0;
  --blush:   #F0E8E3;
  --cherry:  #8C1A30;
  --cherry2: #A82040;
  --gold:    #C4963C;
  --gold2:   #DDB870;
  --border-light: rgba(196,150,60,0.18);
  --border-dark:  rgba(255,255,255,0.07);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;font-size:16px;}
body{
  font-family:'Jost',sans-serif;
  font-weight:400;
  background:var(--white);
  color:var(--ink);
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}
img{display:block;max-width:100%;height:auto;}
a{text-decoration:none;color:inherit;}
button{font-family:inherit;cursor:pointer;border:none;background:none;}

/* ─────────────────────────────────────────
   LAYOUT
───────────────────────────────────────── */
.wrap{max-width:1320px;margin:0 auto;padding:0 48px;}
@media(max-width:900px){.wrap{padding:0 24px;}}
@media(max-width:540px){.wrap{padding:0 18px;}}

/* ─────────────────────────────────────────
   TYPOGRAPHY HELPERS
───────────────────────────────────────── */
.serif{font-family:'DM Serif Display',serif;font-weight:400;}
.label{
  font-size:0.68rem;
  font-weight:600;
  letter-spacing:0.22em;
  text-transform:uppercase;
  color:var(--gold);
  display:inline-flex;
  align-items:center;
  gap:10px;
}
.label::before{content:'';width:24px;height:1px;background:currentColor;flex-shrink:0;}

/* ─────────────────────────────────────────
   CURSOR DOT
───────────────────────────────────────── */
.cursor{
  position:fixed;
  top:0;left:0;
  width:8px;height:8px;
  background:var(--gold);
  border-radius:50%;
  pointer-events:none;
  z-index:9999;
  transform:translate(-50%,-50%);
  transition:width 0.25s,height 0.25s,background 0.25s;
  mix-blend-mode:difference;
}
.cursor.grow{width:36px;height:36px;background:rgba(196,150,60,0.3);}
@media(hover:none){.cursor{display:none;}}

/* ─────────────────────────────────────────
   NAV
───────────────────────────────────────── */
#nav{
  position:fixed;
  inset:0 0 auto;
  z-index:800;
  height:76px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 48px;
  transition:background 0.5s, border-color 0.5s, backdrop-filter 0.5s;
  border-bottom:1px solid transparent;
}
#nav.solid{
  background:rgba(8,5,8,0.92);
  border-color:var(--border-dark);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
}
.nav-logo{
  font-family:'DM Serif Display',serif;
  font-size:1.35rem;
  letter-spacing:0.04em;
  color:#fff;
  display:flex;
  align-items:center;
  gap:10px;
  flex-shrink:0;
}
.logo-gem{
  width:20px;height:20px;
  background:var(--cherry);
  clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%);
  flex-shrink:0;
}
.nav-links{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:44px;
  list-style:none;
}
.nav-links a{
  font-size:0.72rem;
  font-weight:500;
  letter-spacing:0.16em;
  text-transform:uppercase;
  color:rgba(255,255,255,0.55);
  transition:color 0.2s;
  position:relative;
  padding-bottom:4px;
}
.nav-links a::after{
  content:'';
  position:absolute;
  bottom:0;left:0;right:100%;
  height:1px;
  background:var(--gold);
  transition:right 0.3s cubic-bezier(0.16,1,0.3,1);
}
.nav-links a:hover{color:#fff;}
.nav-links a:hover::after{right:0;}
.nav-order{
  font-size:0.68rem;
  font-weight:600;
  letter-spacing:0.18em;
  text-transform:uppercase;
  color:#fff;
  padding:10px 26px;
  border:1px solid rgba(255,255,255,0.22);
  border-radius:1px;
  transition:all 0.25s;
  flex-shrink:0;
}
.nav-order:hover{background:var(--cherry);border-color:var(--cherry);}
.hamburger{
  display:none;
  flex-direction:column;
  gap:6px;
  cursor:pointer;
  padding:4px;
}
.hamburger span{
  width:26px;height:1.5px;
  background:#fff;
  transition:transform 0.3s,opacity 0.3s;
}
@media(max-width:900px){
  .nav-links{display:none;}
  .nav-order{display:none;}
  .hamburger{display:flex;}
  #nav{padding:0 24px;}
}

/* Mobile menu */
#mobile-menu{
  display:none;
  position:fixed;
  inset:0;
  background:var(--black);
  z-index:790;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:36px;
}
#mobile-menu.open{display:flex;}
#mobile-menu a{
  font-family:'DM Serif Display',serif;
  font-size:2.4rem;
  color:#fff;
  opacity:0.7;
  transition:opacity 0.2s,color 0.2s;
}
#mobile-menu a:hover{opacity:1;color:var(--gold2);}

/* ─────────────────────────────────────────
   HERO
───────────────────────────────────────── */
.hero{
  position:relative;
  height:100svh;
  min-height:680px;
  display:grid;
  grid-template-columns:1fr 1fr;
  overflow:hidden;
  background:var(--black);
}
/* Left panel */
.hero-l{
  position:relative;
  z-index:2;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  padding:0 72px 88px;
  overflow:hidden;
}
/* Subtle diagonal crop */
.hero-l::after{
  content:'';
  position:absolute;
  top:0;right:-60px;bottom:0;width:120px;
  background:var(--black);
  clip-path:polygon(0 0,100% 0,0 100%);
  z-index:1;
  pointer-events:none;
}
/* Ambient red glow behind text */
.hero-glow{
  position:absolute;
  bottom:-100px;left:-100px;
  width:500px;height:500px;
  background:radial-gradient(ellipse, rgba(140,26,48,0.35) 0%, transparent 70%);
  pointer-events:none;
}
.hero-tagline{
  position:relative;
  z-index:2;
  margin-bottom:32px;
}
.hero-kicker{
  display:block;
  font-size:0.68rem;
  font-weight:600;
  letter-spacing:0.24em;
  text-transform:uppercase;
  color:var(--gold);
  margin-bottom:24px;
}
.hero-h1{
  font-family:'DM Serif Display',serif;
  font-size:clamp(4rem,6.5vw,8rem);
  line-height:0.9;
  color:#fff;
  letter-spacing:-0.02em;
}
.hero-h1 .italic{
  font-style:italic;
  color:var(--gold2);
  display:block;
}
.hero-body{
  position:relative;
  z-index:2;
  font-size:0.9rem;
  color:rgba(255,255,255,0.45);
  line-height:1.85;
  font-weight:300;
  max-width:320px;
  margin-bottom:44px;
}
.hero-btns{
  position:relative;
  z-index:2;
  display:flex;
  gap:14px;
  flex-wrap:wrap;
}
.btn-fill{
  display:inline-flex;
  align-items:center;
  gap:10px;
  font-size:0.7rem;
  font-weight:600;
  letter-spacing:0.18em;
  text-transform:uppercase;
  padding:15px 36px;
  background:var(--cherry);
  color:#fff;
  border:1px solid var(--cherry);
  border-radius:1px;
  transition:all 0.25s;
}
.btn-fill:hover{background:var(--cherry2);border-color:var(--cherry2);transform:translateY(-2px);box-shadow:0 14px 36px rgba(140,26,48,0.35);}
.btn-line{
  display:inline-flex;
  align-items:center;
  gap:10px;
  font-size:0.7rem;
  font-weight:600;
  letter-spacing:0.18em;
  text-transform:uppercase;
  padding:15px 36px;
  background:transparent;
  color:rgba(255,255,255,0.6);
  border:1px solid rgba(255,255,255,0.18);
  border-radius:1px;
  transition:all 0.25s;
}
.btn-line:hover{color:#fff;border-color:rgba(255,255,255,0.6);transform:translateY(-2px);}
/* Hero scroll cue */
.hero-scroll-cue{
  position:absolute;
  bottom:40px;left:72px;
  z-index:2;
  display:flex;
  align-items:center;
  gap:12px;
  font-size:0.65rem;
  font-weight:500;
  letter-spacing:0.18em;
  text-transform:uppercase;
  color:rgba(255,255,255,0.22);
}
.scroll-line{
  width:44px;height:1px;
  background:rgba(255,255,255,0.12);
  overflow:hidden;
  position:relative;
}
.scroll-line::after{
  content:'';
  position:absolute;
  left:-100%;top:0;
  width:100%;height:100%;
  background:var(--gold);
  animation:scanLine 2.4s ease-in-out infinite;
}
@keyframes scanLine{0%{left:-100%}60%{left:0}100%{left:100%}}
/* Hero right — image */
.hero-r{
  position:relative;
  overflow:hidden;
}
.hero-r img{
  width:100%;height:100%;
  object-fit:cover;
  object-position:center top;
  transform:scale(1.04);
  animation:heroZoom 12s ease-in-out infinite alternate;
}
@keyframes heroZoom{from{transform:scale(1.04)}to{transform:scale(1.0)}}
/* Spinning badge */
.spin-badge{
  position:absolute;
  top:48px;right:48px;
  z-index:3;
  width:92px;height:92px;
}
.spin-badge svg{
  width:100%;height:100%;
  animation:rotateBadge 16s linear infinite;
}
.spin-badge-center{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:1.4rem;
}
@keyframes rotateBadge{to{transform:rotate(360deg)}}
/* Stats strip */
.hero-stats{
  position:absolute;
  bottom:0;left:0;right:0;
  z-index:3;
  display:flex;
  border-top:1px solid rgba(255,255,255,0.08);
  background:rgba(8,5,8,0.7);
  backdrop-filter:blur(12px);
}
.h-stat{
  flex:1;
  padding:22px 28px;
  border-right:1px solid rgba(255,255,255,0.06);
  text-align:center;
}
.h-stat:last-child{border-right:none;}
.h-stat-num{
  font-family:'DM Serif Display',serif;
  font-size:1.6rem;
  color:#fff;
  line-height:1;
  margin-bottom:4px;
}
.h-stat-label{
  font-size:0.62rem;
  font-weight:500;
  letter-spacing:0.14em;
  text-transform:uppercase;
  color:rgba(255,255,255,0.3);
}
@media(max-width:900px){
  .hero{grid-template-columns:1fr;height:auto;min-height:100svh;}
  .hero-l{padding:120px 28px 80px;min-height:75svh;}
  .hero-l::after{display:none;}
  .hero-r{height:55svh;}
  .hero-scroll-cue{left:28px;}
  .spin-badge{top:28px;right:28px;width:76px;height:76px;}
  .hero-stats{position:relative;}
}

/* ─────────────────────────────────────────
   TICKER / MARQUEE
───────────────────────────────────────── */
.ticker{
  background:var(--cherry);
  overflow:hidden;
  padding:0;
  height:44px;
  display:flex;
  align-items:center;
}
.ticker-track{
  display:flex;
  animation:ticker 28s linear infinite;
  white-space:nowrap;
}
.ticker-item{
  display:inline-flex;
  align-items:center;
  gap:28px;
  padding:0 28px;
  font-size:0.72rem;
  font-weight:500;
  letter-spacing:0.16em;
  text-transform:uppercase;
  color:rgba(255,255,255,0.85);
  flex-shrink:0;
}
.ticker-gem{
  width:5px;height:5px;
  background:var(--gold2);
  clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%);
  flex-shrink:0;
}
@keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* ─────────────────────────────────────────
   ABOUT
───────────────────────────────────────── */
.about{
  padding:160px 0;
  background:var(--white);
}
.about-grid{
  display:grid;
  grid-template-columns:5fr 7fr;
  gap:120px;
  align-items:center;
}
/* Image stack */
.about-imgs{
  position:relative;
  height:700px;
}
.about-img-a{
  position:absolute;
  top:0;left:0;
  width:72%;height:80%;
  overflow:hidden;
  border-radius:2px;
}
.about-img-a img{width:100%;height:100%;object-fit:cover;object-position:center top;}
.about-img-b{
  position:absolute;
  bottom:0;right:0;
  width:54%;height:50%;
  overflow:hidden;
  border-radius:2px;
  border:6px solid var(--white);
  box-shadow:0 24px 72px rgba(8,5,8,0.16);
}
.about-img-b img{width:100%;height:100%;object-fit:cover;object-position:center top;}
/* Floating card */
.about-card{
  position:absolute;
  top:48%;right:-36px;
  background:#fff;
  border-radius:2px;
  padding:24px 28px;
  box-shadow:0 16px 56px rgba(8,5,8,0.13);
  border-left:3px solid var(--cherry);
  z-index:3;
  min-width:150px;
  text-align:center;
}
.about-card-big{
  font-family:'DM Serif Display',serif;
  font-size:2rem;
  color:var(--cherry);
  line-height:1;
  margin-bottom:4px;
}
.about-card-sm{
  font-size:0.65rem;
  font-weight:600;
  letter-spacing:0.14em;
  text-transform:uppercase;
  color:var(--smoke);
}
/* Text side */
.about-text .label{margin-bottom:20px;}
.about-h2{
  font-family:'DM Serif Display',serif;
  font-size:clamp(2rem,4vw,3.4rem);
  line-height:1.1;
  letter-spacing:-0.01em;
  margin-bottom:28px;
  color:var(--ink);
}
.about-h2 em{font-style:italic;color:var(--cherry);}
.about-p{
  font-size:0.95rem;
  color:var(--smoke);
  line-height:1.9;
  font-weight:300;
  margin-bottom:20px;
}
.about-rule{
  width:48px;height:1px;
  background:var(--border-light);
  margin:36px 0;
}
.feat-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:24px;
}
.feat{
  padding:22px;
  background:var(--off);
  border-radius:2px;
  border:1px solid var(--border-light);
  transition:border-color 0.25s,box-shadow 0.25s;
}
.feat:hover{
  border-color:rgba(140,26,48,0.3);
  box-shadow:0 4px 20px rgba(140,26,48,0.07);
}
.feat-ico{font-size:1.3rem;margin-bottom:10px;}
.feat-title{
  font-size:0.78rem;
  font-weight:600;
  letter-spacing:0.08em;
  text-transform:uppercase;
  color:var(--ink);
  margin-bottom:6px;
}
.feat-txt{
  font-size:0.8rem;
  color:var(--smoke);
  line-height:1.65;
  font-weight:300;
}
@media(max-width:900px){
  .about-grid{grid-template-columns:1fr;gap:72px;}
  .about-imgs{height:480px;}
  .about-card{right:0;}
}

/* ─────────────────────────────────────────
   GALLERY
───────────────────────────────────────── */
.gallery{
  padding:120px 0 160px;
  background:var(--off);
  border-top:1px solid var(--border-light);
}
.gallery-head{
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
  margin-bottom:60px;
  gap:20px;
  flex-wrap:wrap;
}
.gallery-h2{
  font-family:'DM Serif Display',serif;
  font-size:clamp(2rem,4vw,3.2rem);
  line-height:1.1;
  letter-spacing:-0.01em;
}
.gallery-h2 em{font-style:italic;color:var(--cherry);}
.gallery-link{
  font-size:0.7rem;
  font-weight:600;
  letter-spacing:0.18em;
  text-transform:uppercase;
  color:var(--cherry);
  display:inline-flex;
  align-items:center;
  gap:8px;
  border-bottom:1px solid var(--cherry);
  padding-bottom:2px;
  transition:gap 0.2s,color 0.2s;
  flex-shrink:0;
  margin-bottom:6px;
}
.gallery-link:hover{gap:14px;color:var(--cherry2);border-color:var(--cherry2);}
/* Mosaic */
.mosaic{
  display:grid;
  grid-template-columns:repeat(12,1fr);
  grid-template-rows:360px 320px;
  gap:12px;
}
.m1{grid-column:1/6;grid-row:1/3;}
.m2{grid-column:6/9;grid-row:1/2;}
.m3{grid-column:9/13;grid-row:1/2;}
.m4{grid-column:6/13;grid-row:2/3;}
.mosaic-item{
  position:relative;
  overflow:hidden;
  border-radius:2px;
  background:var(--dark);
  cursor:pointer;
}
.mosaic-item img{
  width:100%;height:100%;
  object-fit:cover;
  object-position:center top;
  transition:transform 0.8s cubic-bezier(0.16,1,0.3,1),filter 0.4s;
  filter:brightness(0.9);
}
.mosaic-item:hover img{transform:scale(1.07);filter:brightness(1);}
.mosaic-cap{
  position:absolute;
  bottom:0;left:0;right:0;
  padding:56px 22px 22px;
  background:linear-gradient(transparent,rgba(8,5,8,0.78));
  opacity:0;
  transform:translateY(6px);
  transition:opacity 0.35s,transform 0.35s;
}
.mosaic-item:hover .mosaic-cap{opacity:1;transform:none;}
.mosaic-cap-title{
  font-family:'DM Serif Display',serif;
  font-size:1.1rem;
  color:#fff;
  margin-bottom:4px;
}
.mosaic-cap-tag{
  font-size:0.65rem;
  font-weight:600;
  letter-spacing:0.16em;
  text-transform:uppercase;
  color:var(--gold2);
}
.mosaic-num{
  position:absolute;
  top:14px;left:14px;
  font-family:'DM Serif Display',serif;
  font-style:italic;
  font-size:0.78rem;
  color:rgba(255,255,255,0.3);
}
@media(max-width:900px){
  .mosaic{
    grid-template-columns:1fr 1fr;
    grid-template-rows:auto;
  }
  .m1{grid-column:1/3;grid-row:auto;aspect-ratio:4/3;}
  .m2,.m3{grid-column:span 1;aspect-ratio:3/4;}
  .m4{grid-column:1/3;grid-row:auto;aspect-ratio:16/7;}
}
@media(max-width:540px){
  .mosaic{grid-template-columns:1fr;}
  .m1,.m2,.m3,.m4{grid-column:1;aspect-ratio:4/3;}
}

/* ─────────────────────────────────────────
   OPENING SPECIALS
───────────────────────────────────────── */
.specials{
  padding:160px 0;
  background:var(--dark);
  position:relative;
  overflow:hidden;
}
/* Watermark word */
.specials-wm{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  font-family:'DM Serif Display',serif;
  font-size:clamp(6rem,20vw,22rem);
  font-style:italic;
  color:rgba(255,255,255,0.018);
  letter-spacing:0.05em;
  white-space:nowrap;
  pointer-events:none;
  user-select:none;
}
.specials-head{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:60px;
  align-items:end;
  margin-bottom:80px;
}
.specials-h2{
  font-family:'DM Serif Display',serif;
  font-size:clamp(2.2rem,5vw,4rem);
  line-height:1.05;
  color:#fff;
  letter-spacing:-0.01em;
}
.specials-h2 em{font-style:italic;color:var(--gold2);}
.specials-sub{
  font-size:0.9rem;
  color:rgba(255,255,255,0.35);
  line-height:1.9;
  font-weight:300;
  max-width:380px;
}
/* Cards */
.s-cards{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:1px;
  background:var(--border-dark);
  border:1px solid var(--border-dark);
  border-radius:2px;
  overflow:hidden;
}
.s-card{
  padding:52px 40px 44px;
  background:rgba(255,255,255,0.02);
  position:relative;
  transition:background 0.3s;
  display:flex;
  flex-direction:column;
}
.s-card:hover{background:rgba(255,255,255,0.045);}
/* Top accent bar */
.s-card::before{
  content:'';
  position:absolute;
  top:0;left:40px;right:40px;
  height:1px;
  background:linear-gradient(90deg,var(--cherry),transparent);
  opacity:0;
  transition:opacity 0.3s;
}
.s-card:hover::before{opacity:1;}
.s-ordinal{
  font-family:'DM Serif Display',serif;
  font-style:italic;
  font-size:3.5rem;
  color:rgba(255,255,255,0.05);
  line-height:1;
  margin-bottom:20px;
}
